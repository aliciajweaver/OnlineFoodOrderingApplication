<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-body">
    <div class="login-card">
        <div class="text-center logo text-white">Alicia's Pork Paradise</div>
        <h3 class="text-center text-white mb-4">Welcome Back</h3>
        <form id="loginForm" action="dashboard.html" onsubmit="return checkInfo()">
            <div class="form-floating mb-3">
                <input type="email" class="form-control" id="emailId" placeholder="name@example.com" required>
                <label for="email">Email address</label>
            </div>
            <div class="form-floating mb-4 position-relative">
                <input type="password" class="form-control" id="password" placeholder="Password" required>
                <label for="password">Password</label>
                <span class="password-toggle" onclick="togglePassword()">Show</span>
            </div>

            <button class="btn btn-light w-100 login-btn" type="submit" id="loginButton">Login</button>
        </form>
    </div>
    <script src="js/login.js"></script>

</body>
</html>
